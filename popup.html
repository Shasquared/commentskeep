<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CommentKeep</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="app">

  <header class="header">
    <div class="header__logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      CommentsKeep
    </div>
    <button class="header__close" id="closeBtn" aria-label="Close">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </header>

  <div class="header__saved" id="totalCount">0 Saved</div>

  <div class="search-row">
    <div class="search-wrap">
      <svg class="search-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="searchInput" class="search-input" placeholder="Search comments" autocomplete="off" spellcheck="false">
      <button class="search-clear" id="clearSearch" aria-label="Clear" style="display:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <div class="tag-filter" id="tagFilter"></div>

  <div class="list" id="commentList"></div>

  <div class="empty-state" id="emptyState">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" style="color:#aeaeb2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
    <p>No saved comments yet</p>
    <span>Hit the bookmark icon on any<br>YouTube comment to save it here</span>
  </div>

</div>
<script src="popup.js"></script>
</body>
</html>
